name: Build and Release

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            binary_path: target/release/grepgrep
            package_name: grepgrep_linux.zip
          - os: windows-latest
            platform: windows
            binary_path: target/release/grepgrep.exe
            package_name: grepgrep_windows.zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libgtk-3-dev \
            libxdo-dev \
            libx11-dev \
            libxfixes-dev \
            libxcb-randr0-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libpulse-dev \
            zip

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build outputs
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Package Linux artifact
        if: matrix.platform == 'linux'
        run: |
          mkdir -p release/linux
          cp "${{ matrix.binary_path }}" release/linux/grepgrep
          cp README.md release/linux/README.md
          cd release/linux
          zip -r "../../${{ matrix.package_name }}" .

      - name: Package Windows artifact
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release/windows | Out-Null
          Copy-Item "${{ matrix.binary_path }}" "release/windows/grepgrep.exe"
          Copy-Item "README.md" "release/windows/README.md"
          Compress-Archive -Path "release/windows/*" -DestinationPath "${{ matrix.package_name }}" -Force

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-release
          path: ${{ matrix.package_name }}
          if-no-files-found: error

  publish-nightly:
    name: Publish nightly prerelease
    needs: build
    if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master')
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish nightly prerelease
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifactErrorsFailBuild: true
          artifacts: "release-assets/linux-release/grepgrep_linux.zip,release-assets/windows-release/grepgrep_windows.zip"
          commit: ${{ github.sha }}
          generateReleaseNotes: true
          makeLatest: false
          name: nightly
          omitBodyDuringUpdate: true
          prerelease: true
          removeArtifacts: true
          replacesArtifacts: true
          tag: nightly

  publish-release:
    name: Publish tagged release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub release
        uses: ncipollo/release-action@v1
        with:
          artifactErrorsFailBuild: true
          artifacts: "release-assets/linux-release/grepgrep_linux.zip,release-assets/windows-release/grepgrep_windows.zip"
          generateReleaseNotes: true
          makeLatest: true
          name: ${{ github.ref_name }}
          tag: ${{ github.ref_name }}
